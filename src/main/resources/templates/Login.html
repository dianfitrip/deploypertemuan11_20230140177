<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Violet Garden</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #6a1b9a;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.2);
            width: 350px;
            text-align: center;
            border: 3px solid #d1c4e9;
        }
        h2 { margin-bottom: 20px; font-weight: 600; }
        .flower-icon { color: #9c27b0; font-size: 2rem; margin-bottom: 10px; }
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #e1bee7;
            border-radius: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #9c27b0; box-shadow: 0 0 8px #e1bee7; }
        button {
            background-color: #9c27b0;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background-color: #7b1fa2; transform: translateY(-2px); }
        .footer-text { margin-top: 20px; font-size: 0.9rem; }
        a { color: #9c27b0; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-container">
    <i class="fas fa-seedling flower-icon"></i>
    <h2>Welcome Back!</h2>
    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login <i class="fas fa-magic"></i></button>
    </form>
    <div class="footer-text">
        <p>Belum punya akun?</p>
        <a th:href="@{/register}">Register di sini <i class="fas fa-heart"></i></a>
    </div>
</div>
</body>
</html>
